<!DOCTYPE html>
<html>
<head>
<title>BrowserCraft Ultimate</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

#crosshair{
position:fixed;
top:50%;
left:50%;
width:8px;
height:8px;
background:white;
transform:translate(-50%,-50%);
}

#hotbar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.slot{
width:50px;
height:50px;
background:#ddd;
border:3px solid black;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.selected{
border-color:yellow;
}

</style>

</head>
<body>

<div id="crosshair"></div>

<div id="hotbar">
<div class="slot selected">🟩</div>
<div class="slot">🟫</div>
<div class="slot">🪨</div>
<div class="slot">🌳</div>
<div class="slot">💎</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>
<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let sun=new THREE.DirectionalLight(0xffffff,1)
sun.position.set(20,40,20)
scene.add(sun)

scene.add(new THREE.AmbientLight(0x777777))

const geometry=new THREE.BoxGeometry(1,1,1)

let blocks=[]

function createBlock(x,y,z,color){

let material=new THREE.MeshLambertMaterial({color})

let cube=new THREE.Mesh(geometry,material)

cube.position.set(x,y,z)

scene.add(cube)

blocks.push(cube)

}

function terrainHeight(x,z){

return Math.floor(
Math.sin(x*0.2)*2+
Math.cos(z*0.2)*2+
Math.random()*2
)

}

function createTree(x,y,z){

for(let i=1;i<4;i++){
createBlock(x,y+i,z,0x8B5A2B)
}

createBlock(x+1,y+4,z,0x228B22)
createBlock(x-1,y+4,z,0x228B22)
createBlock(x,y+4,z+1,0x228B22)
createBlock(x,y+4,z-1,0x228B22)
createBlock(x,y+5,z,0x228B22)

}

for(let x=-40;x<40;x++){

for(let z=-40;z<40;z++){

let h=terrainHeight(x,z)

for(let y=0;y<=h;y++){

createBlock(x,y,z,0x55aa55)

}

if(Math.random()<0.04){

createTree(x,h,z)

}

if(h<0){

createBlock(x,-1,z,0x3399ff)

}

}

}

camera.position.set(0,8,10)

const controls=new THREE.PointerLockControls(camera,document.body)

document.addEventListener("click",()=>controls.lock())

scene.add(controls.getObject())

let keys={}

document.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.key>="1" && e.key<="5"){

selected=Number(e.key)-1

document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"))

document.querySelectorAll(".slot")[selected].classList.add("selected")

}

})

document.addEventListener("keyup",e=>keys[e.key]=false)

function move(){

let speed=0.2

if(keys["w"]) controls.moveForward(speed)
if(keys["s"]) controls.moveForward(-speed)
if(keys["a"]) controls.moveRight(-speed)
if(keys["d"]) controls.moveRight(speed)

}

let raycaster=new THREE.Raycaster()

document.addEventListener("mousedown",e=>{

raycaster.setFromCamera(new THREE.Vector2(0,0),camera)

let hit=raycaster.intersectObjects(blocks)

if(hit.length>0){

let block=hit[0].object

if(e.button===0){

scene.remove(block)
blocks=blocks.filter(b=>b!==block)

}

if(e.button===2){

let p=hit[0].point
let n=hit[0].face.normal

createBlock(
Math.round(p.x+n.x),
Math.round(p.y+n.y),
Math.round(p.z+n.z),
0x55aa55
)

}

}

})

document.addEventListener("contextmenu",e=>e.preventDefault())

let time=0

function animate(){

requestAnimationFrame(animate)

move()

time+=0.002

scene.background=new THREE.Color().setHSL(
0.6,
0.5,
0.6-Math.sin(time)*0.25
)

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
